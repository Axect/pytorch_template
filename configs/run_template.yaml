project: PyTorch_Template
device: cuda:0
logging: wandb  # 'wandb' or 'tui' (agent-friendly terminal logging)
net: model.MLP
optimizer: pytorch_optimizer.SPlus
scheduler: pytorch_scheduler.ExpHyperbolicLRScheduler
epochs: 50
batch_size: 256
seeds: [89, 231, 928, 814, 269]
net_config:
  nodes: 64
  layers: 4
optimizer_config:
  lr: 1.e-3 # Must contain dot for float
  eps: 1.e-10
scheduler_config:
  total_steps: 50
  upper_bound: 250
  min_lr: 1.e-5
criterion: torch.nn.MSELoss
criterion_config: {}
data: util.load_data
early_stopping_config:
  enabled: false
  patience: 10
  mode: min # 'min' or 'max'
  min_delta: 0.0001 # Percent
checkpoint_config:
  enabled: false
  save_every_n_epochs: 10
  keep_last_k: 3
  save_best: true
  monitor: val_loss
  mode: min
