project: PyTorch_Template
device: cuda:0
net: model.MLP
optimizer: splus.SPlus
scheduler: hyperbolic_lr.ExpHyperbolicLR
epochs: 50
batch_size: 256
seeds: [89, 231, 928, 814, 269]
net_config:
  nodes: 64
  layers: 4
optimizer_config:
  lr: 1.e-3 # Must contain dot for float
  eps: 1.e-10
scheduler_config:
  upper_bound: 250
  max_iter: 50
  infimum_lr: 1.e-5
criterion: torch.nn.MSELoss
criterion_config: {}
early_stopping_config:
  enabled: false
  patience: 10
  mode: min # 'min' or 'max'
  min_delta: 0.0001 # Percent
checkpoint_config:
  enabled: false
  save_every_n_epochs: 10
  keep_last_k: 3
  save_best: true
  monitor: val_loss
  mode: min
